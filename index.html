<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar 2026</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="blob-wrap">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="page-wrap">

    <h1 class="page-title">Calendar 2026</h1>

    <div class="view-toggle">
      <button class="v-btn active" id="btn-single">Single Month</button>
      <button class="v-btn" id="btn-all">All 12 Months</button>
    </div>

    <div id="single-view" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:24px;">

      <div class="month-tabs" id="month-tabs"></div>

      <div class="cal-card">
        <div class="cal-header">
          <button class="nav-btn" id="prev">&#8249;</button>
          <span class="cal-month-title" id="month-label"></span>
          <button class="nav-btn" id="next">&#8250;</button>
        </div>


        <table class="cal-table table">
          <thead>
            <tr>
              <th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th>
            </tr>
          </thead>
          <tbody id="cal-body"></tbody>
        </table>
      </div>

    </div>

    <div class="all-view" id="all-view">
      <div class="months-grid" id="months-grid"></div>
    </div>

  </div>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>


  <script src="script.js"></script>

</body>
</html>
